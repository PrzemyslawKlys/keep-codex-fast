<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Keep Codex Fast flow</title>
  <desc id="desc">A simple flow showing report first, make handoffs, confirm cleanup, archive safely, and start fresh threads.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fa; }
      .card { fill: #ffffff; stroke: #d8e0ea; stroke-width: 2; }
      .accent { fill: #eaf4ff; stroke: #2f80ed; }
      .safe { fill: #eef8f1; stroke: #3aa661; }
      .warn { fill: #fff7e8; stroke: #d69b2d; }
      .text { fill: #0b1220; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #44546a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .line { stroke: #9aabc0; stroke-width: 3; fill: none; stroke-linecap: round; }
      .dot { fill: #2f80ed; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="520" rx="28"/>
  <g opacity="0.45">
    <circle cx="70" cy="70" r="2" fill="#c7d2df"/>
    <circle cx="120" cy="70" r="2" fill="#c7d2df"/>
    <circle cx="170" cy="70" r="2" fill="#c7d2df"/>
    <circle cx="220" cy="70" r="2" fill="#c7d2df"/>
    <circle cx="270" cy="70" r="2" fill="#c7d2df"/>
    <circle cx="320" cy="70" r="2" fill="#c7d2df"/>
    <circle cx="370" cy="70" r="2" fill="#c7d2df"/>
    <circle cx="420" cy="70" r="2" fill="#c7d2df"/>
    <circle cx="470" cy="70" r="2" fill="#c7d2df"/>
    <circle cx="520" cy="70" r="2" fill="#c7d2df"/>
    <circle cx="570" cy="70" r="2" fill="#c7d2df"/>
    <circle cx="620" cy="70" r="2" fill="#c7d2df"/>
    <circle cx="670" cy="70" r="2" fill="#c7d2df"/>
    <circle cx="720" cy="70" r="2" fill="#c7d2df"/>
    <circle cx="770" cy="70" r="2" fill="#c7d2df"/>
    <circle cx="820" cy="70" r="2" fill="#c7d2df"/>
    <circle cx="870" cy="70" r="2" fill="#c7d2df"/>
    <circle cx="920" cy="70" r="2" fill="#c7d2df"/>
    <circle cx="970" cy="70" r="2" fill="#c7d2df"/>
    <circle cx="1020" cy="70" r="2" fill="#c7d2df"/>
    <circle cx="1070" cy="70" r="2" fill="#c7d2df"/>
    <circle cx="1120" cy="70" r="2" fill="#c7d2df"/>
  </g>

  <text x="58" y="78" class="text" font-size="38" font-weight="750">How keep-codex-fast works</text>
  <text x="58" y="115" class="muted" font-size="20">Report first. Preserve context. Archive safely. Start fresh.</text>

  <path class="line" d="M205 250 H355"/>
  <path class="line" d="M505 250 H655"/>
  <path class="line" d="M805 250 H955"/>
  <path class="line" d="M580 332 C580 395 690 395 690 332"/>

  <g transform="translate(55 170)">
    <rect class="card" width="180" height="160" rx="20"/>
    <circle class="dot" cx="36" cy="44" r="10"/>
    <text x="28" y="86" class="text" font-size="25" font-weight="700">1. Report</text>
    <text x="28" y="120" class="muted" font-size="17">Find what is</text>
    <text x="28" y="143" class="muted" font-size="17">getting heavy.</text>
  </g>

  <g transform="translate(355 170)">
    <rect class="accent" width="180" height="160" rx="20"/>
    <circle class="dot" cx="36" cy="44" r="10"/>
    <text x="28" y="86" class="text" font-size="25" font-weight="700">2. Handoff</text>
    <text x="28" y="120" class="muted" font-size="17">Save context for</text>
    <text x="28" y="143" class="muted" font-size="17">active work.</text>
  </g>

  <g transform="translate(655 170)">
    <rect class="warn" width="180" height="160" rx="20"/>
    <circle cx="36" cy="44" r="10" fill="#d69b2d"/>
    <text x="28" y="86" class="text" font-size="25" font-weight="700">3. Confirm</text>
    <text x="28" y="120" class="muted" font-size="17">Only clean up</text>
    <text x="28" y="143" class="muted" font-size="17">when ready.</text>
  </g>

  <g transform="translate(955 170)">
    <rect class="safe" width="190" height="160" rx="20"/>
    <circle cx="36" cy="44" r="10" fill="#3aa661"/>
    <text x="28" y="86" class="text" font-size="25" font-weight="700">4. Archive</text>
    <text x="28" y="120" class="muted" font-size="17">Move old state.</text>
    <text x="28" y="143" class="muted" font-size="17">Never delete.</text>
  </g>

  <g transform="translate(430 365)">
    <rect class="card" width="300" height="86" rx="18"/>
    <text x="28" y="37" class="text" font-size="23" font-weight="700">Fresh threads feel lighter</text>
    <text x="28" y="65" class="muted" font-size="17">Continue from handoff docs.</text>
  </g>

  <g transform="translate(770 365)">
    <rect class="card" width="310" height="86" rx="18"/>
    <text x="28" y="37" class="text" font-size="23" font-weight="700">Weekly reminder</text>
    <text x="28" y="65" class="muted" font-size="17">Report only. No auto-cleanup.</text>
  </g>
</svg>
